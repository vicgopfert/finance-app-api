name: Deploy

on:
    push:
        branches:
            - main

jobs:
    check:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Start PostgreSQL Test Container (with healthcheck wait)
              env:
                  POSTGRES_USER: postgres
                  POSTGRES_PASSWORD: test_password
                  POSTGRES_DB: financeapp
                  POSTGRES_PORT: 5432
                  POSTGRES_TEST_PORT: 5433
              run: docker compose up -d --wait postgres-test

            - name: Apply migrations
              env:
                  DATABASE_URL: postgresql://postgres:test_password@localhost:5433/financeapp
              run: npx prisma migrate deploy

            - name: ESLint
              run: npm run lint

            - name: Prettier
              run: npm run prettier:check

            - name: Test
              env:
                  DATABASE_URL: postgresql://postgres:test_password@localhost:5433/financeapp
              run: npm run test

            - name: Stop Containers
              if: always()
              run: docker compose down --volumes

    migrate:
        runs-on: ubuntu-latest
        needs: check
        environment: production

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Validate DATABASE_URL secret
              run: |
                  if [ -z "${{ secrets.DATABASE_URL }}" ]; then
                    echo "::error::DATABASE_URL secret is not set in the 'production' environment"
                    exit 1
                  fi

            - name: Run migrations
              env:
                  DATABASE_URL: ${{ secrets.DATABASE_URL }}
              run: npx prisma migrate deploy

    deploy:
        runs-on: ubuntu-latest
        needs: migrate
        environment: production

        steps:
            - name: Validate RENDER_DEPLOY_HOOK_URL secret
              run: |
                  if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
                    echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set"
                    exit 1
                  fi

            - name: Trigger Render Deploy
              run: |
                  curl --fail --silent --show-error \
                    "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

            - name: Deploy triggered successfully
              run: echo "Render deploy triggered successfully."
